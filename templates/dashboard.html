<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Manager Dashboard</title>
    <style>
        /* Keeping typography consistent with the upload pages */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Dark radial gradient background to make the glass pop */
            background: radial-gradient(circle at top right, #2c313a, #0b0f19 70%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #ffffff;
            min-height: 100vh;
            padding: 40px;
        }

        /* --- Header Section & Divider --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08); /* Frosted divider line */
            margin-bottom: 40px;
        }

        .brand-badge {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 8px 16px;
            /* Added min dimensions so it looks good even without the image loading */
            min-width: 40px; 
            min-height: 40px;
            object-fit: contain;

            cursor: pointer;
        }

        .title-container {
            text-align: center;
        }

        .title-container h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .title-container p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
            font-weight: 400;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: right;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .user-details .username {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
        }

        .user-details .role {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .avatar-placeholder {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
        }

        /* --- Dashboard Content --- */
        .dashboard-section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: -0.5px;
        }

        .grid-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        /* --- Interactive Glass Gradient Tiles --- */
        .tile {
            display: flex;
            align-items: center;
            width: 240px;
            height: 95px;
            border-radius: 18px;
            padding: 0 24px;
            text-decoration: none;
            color: #ffffff; /* Switched to white for dark mode contrast */
            font-weight: 500;
            font-size: 16px;
            gap: 16px;
            
            /* Core Glass Properties */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .tile-icon {
            width: 36px;
            height: 36px;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); /* Makes icons pop inside glass */
        }

        /* Tinted Glass Layouts 
           Converted your solid hex colors into semi-transparent rgba gradients 
        */
        
        /* Movie: Orange */
        .tile-movie { background: linear-gradient(135deg, rgba(255, 123, 35, 0.15), rgba(255, 174, 66, 0.05)); }
        .tile-movie:hover {
            background: linear-gradient(135deg, rgba(255, 123, 35, 0.25), rgba(255, 174, 66, 0.15));
            border-color: rgba(255, 174, 66, 0.3);
            box-shadow: 0 10px 30px rgba(255, 123, 35, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transform: translateY(-4px);
        }

        /* Series: Blue */
        .tile-series { background: linear-gradient(135deg, rgba(73, 104, 141, 0.2), rgba(116, 153, 194, 0.1)); }
        .tile-series:hover {
            background: linear-gradient(135deg, rgba(73, 104, 141, 0.3), rgba(116, 153, 194, 0.2));
            border-color: rgba(116, 153, 194, 0.4);
            box-shadow: 0 10px 30px rgba(116, 153, 194, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transform: translateY(-4px);
        }

        /* Audio: Purple */
        .tile-audio { background: linear-gradient(135deg, rgba(135, 78, 244, 0.15), rgba(185, 131, 255, 0.05)); }
        .tile-audio:hover {
            background: linear-gradient(135deg, rgba(135, 78, 244, 0.25), rgba(185, 131, 255, 0.15));
            border-color: rgba(185, 131, 255, 0.3);
            box-shadow: 0 10px 30px rgba(135, 78, 244, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transform: translateY(-4px);
        }

        /* More: Gray/White */
        .tile-more { background: linear-gradient(135deg, rgba(205, 205, 205, 0.1), rgba(240, 240, 240, 0.02)); }
        .tile-more:hover {
            background: linear-gradient(135deg, rgba(205, 205, 205, 0.15), rgba(240, 240, 240, 0.08));
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transform: translateY(-4px);
        }

        /* Uptime: Green */
        .tile-uptime { background: linear-gradient(135deg, rgba(25, 203, 85, 0.15), rgba(86, 236, 132, 0.05)); }
        .tile-uptime:hover {
            background: linear-gradient(135deg, rgba(25, 203, 85, 0.25), rgba(86, 236, 132, 0.15));
            border-color: rgba(86, 236, 132, 0.3);
            box-shadow: 0 10px 30px rgba(25, 203, 85, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transform: translateY(-4px);
        }

        /* Logs: Cyan */
        .tile-logs { background: linear-gradient(135deg, rgba(23, 179, 179, 0.15), rgba(79, 225, 219, 0.05)); }
        .tile-logs:hover {
            background: linear-gradient(135deg, rgba(23, 179, 179, 0.25), rgba(79, 225, 219, 0.15));
            border-color: rgba(79, 225, 219, 0.3);
            box-shadow: 0 10px 30px rgba(23, 179, 179, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transform: translateY(-4px);
        }

        /* Storage: Pink */
        .tile-storage { background: linear-gradient(135deg, rgba(227, 76, 147, 0.15), rgba(249, 133, 190, 0.05)); }
        .tile-storage:hover {
            background: linear-gradient(135deg, rgba(227, 76, 147, 0.25), rgba(249, 133, 190, 0.15));
            border-color: rgba(249, 133, 190, 0.3);
            box-shadow: 0 10px 30px rgba(227, 76, 147, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transform: translateY(-4px);
        }
    </style>
</head>
<body>

    <header class="header">
        <img src="static/icon.png" alt="" class="brand-badge" onclick="window.location.href ='/'">
        
        <div class="title-container">
            <h1>Dashboard</h1>
            <p>Media Manager</p>
        </div>
        
        <div class="user-profile">
            <div class="user-details">
                <div class="username">{{ name }}</div>
                <div class="role">User Role</div>
            </div>
            <div class="avatar-placeholder"></div>
        </div>
    </header>

    <main>
        <section class="dashboard-section">
            <h2 class="section-title">Upload</h2>
            <div class="grid-container">
                
                <a href="upload_movie" class="tile tile-movie">
                    <img src="static/icons/dashboard/movie.png" alt="" class="tile-icon">
                    <span>Movie</span>
                </a>

                <a href="upload_series" class="tile tile-series">
                    <img src="static/icons/dashboard/series.png" alt="" class="tile-icon">
                    <span>Series</span>
                </a>

                <a href="upload_audio" class="tile tile-audio">
                    <img src="static/icons/dashboard/audio.png" alt="" class="tile-icon">
                    <span>Audio</span>
                </a>

                <a href="" class="tile tile-more">
                    <img src="static/icons/dashboard/more.png" alt="" class="tile-icon">
                    <span>More to come</span>
                </a>

            </div>
        </section>

        <section class="dashboard-section">
            <h2 class="section-title">System Info</h2>
            <div class="grid-container">

                <a href="uptime.html" class="tile tile-uptime">
                    <img src="static/icons/dashboard/uptime.png" alt="" class="tile-icon">
                    <span>Uptime</span>
                </a>

                <a href="logs.html" class="tile tile-logs">
                    <img src="static/icons/dashboard/logs.png" alt="" class="tile-icon">
                    <span>Logs</span>
                </a>

                <a href="storage.html" class="tile tile-storage">
                    <img src="static/icons/dashboard/storage.png" alt="" class="tile-icon">
                    <span>Storage</span>
                </a>

            </div>
        </section>
    </main>

</body>
</html>
