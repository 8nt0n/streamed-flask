<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamed - Add Series</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        body {
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            align-items: flex-start; /* Aligned to top so it can scroll naturally */
            justify-content: center;
            font-family: 'Inter', sans-serif;
            
            background-image: url("static/bg_v2d.png");
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            
            color: #ffffff;
            box-sizing: border-box;
        }

        .glass-panel {
            background: rgba(20, 25, 30, 0.4); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .glass-panel h1 {
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: rgba(255, 255, 255, 0.95);
        }

        .section-title {
            font-size: 18px;
            font-weight: 500;
            color: #55b9f3;
            margin-bottom: 15px;
            margin-top: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            margin-left: 4px;
        }

        input[type="text"] {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 14px 16px;
            color: #fff;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        input[type="text"]:focus {
            background: rgba(0, 0, 0, 0.5);
            border-color: #55b9f3;
            box-shadow: 0 0 0 3px rgba(85, 185, 243, 0.15);
        }

        input[type="file"] {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            width: 100%;
        }

        input[type="file"]::file-selector-button {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #fff;
            padding: 8px 16px;
            margin-right: 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        input[type="file"]::file-selector-button:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Nested Season Blocks */
        .season-block {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .season-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .season-header h3 {
            margin: 0;
            font-size: 16px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
        }

        /* Buttons */
        button {
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        .btn-remove {
            background: rgba(255, 75, 75, 0.1);
            border: 1px solid rgba(255, 75, 75, 0.3);
            color: #ff6b6b;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .btn-remove:hover {
            background: rgba(255, 75, 75, 0.2);
            border-color: #ff6b6b;
        }

        .btn-add {
            background: transparent;
            border: 1px dashed rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.8);
            border-radius: 12px;
            padding: 14px;
            font-size: 14px;
            width: 100%;
            margin-top: 10px;
        }

        .btn-add:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #55b9f3;
            color: #55b9f3;
        }

        .btn-submit {
            margin-top: 15px;
            background: rgba(85, 185, 243, 0.1);
            border: 1px solid rgba(85, 185, 243, 0.4);
            border-radius: 12px;
            padding: 16px;
            color: #55b9f3;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
        }

        .btn-submit:hover {
            background: #55b9f3;
            color: #121212;
            box-shadow: 0 4px 20px rgba(85, 185, 243, 0.4);
            transform: translateY(-2px);
        }
        
        .btn-submit:active {
            transform: translateY(1px);
        }

        #seasons-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

    </style>
</head>
<body>

    <div class="glass-panel">
        <h1>Register New Series</h1>
        <form action="/upload_series" method="post" enctype="multipart/form-data">
            
            <!-- Hidden input to tell Flask the maximum season index submitted -->
            <input type="hidden" name="max_season_index" id="max_season_index" value="1">

            <!-- SERIES MASTER INFO -->
            <div class="section-title">Series Details</div>
            
            <div class="input-group">
                <input autocomplete="off" name="series_title" placeholder="Series Title" type="text" required>
            </div>
            
            <div class="input-group">
                <input autocomplete="off" name="series_description" placeholder="Series Description" type="text" required>
            </div>
            
            <div class="input-group">
                <label>Main Series Cover (.png)</label>
                <input type="file" name="series_cover" accept=".png" required>
            </div>

            <!-- SEASONS CONTAINER -->
            <div class="section-title" style="margin-top: 20px;">Seasons</div>
            <div id="seasons-container">
                <!-- Initial Season 1 Block -->
                <div class="season-block" id="season-block-1">
                    <div class="season-header">
                        <h3>Season 1</h3>
                        <!-- No remove button for the first required season -->
                    </div>
                    <div class="input-group">
                        <label>Season 1 Cover (.png)</label>
                        <input type="file" name="season_1_cover" accept=".png" required>
                    </div>
                    <div class="input-group">
                        <label>Episodes (.mp4) — Select multiple files</label>
                        <input type="file" name="season_1_episodes" accept=".mp4" multiple required>
                    </div>
                </div>
            </div>

            <!-- Add New Season Button -->
            <button type="button" class="btn-add" onclick="addSeason()">
                + Add Another Season
            </button>
            
            <!-- Submit Entire Series -->
            <button class="btn-submit" type="submit">Upload Complete Series</button>
        </form>
    </div>

    <script>
        let seasonIndex = 1;

        function addSeason() {
            seasonIndex++;
            
            // Update the hidden input so Flask knows the highest index to check for
            document.getElementById('max_season_index').value = seasonIndex;

            const container = document.getElementById('seasons-container');
            const seasonBlock = document.createElement('div');
            
            seasonBlock.className = 'season-block';
            seasonBlock.id = `season-block-${seasonIndex}`;
            
            seasonBlock.innerHTML = `
                <div class="season-header">
                    <h3>Season ${seasonIndex}</h3>
                    <button type="button" class="btn-remove" onclick="removeSeason(${seasonIndex})">Remove</button>
                </div>
                <div class="input-group">
                    <label>Season ${seasonIndex} Cover (.png)</label>
                    <input type="file" name="season_${seasonIndex}_cover" accept=".png" required>
                </div>
                <div class="input-group">
                    <label>Episodes (.mp4) — Select multiple files</label>
                    <input type="file" name="season_${seasonIndex}_episodes" accept=".mp4" multiple required>
                </div>
            `;
            
            container.appendChild(seasonBlock);
        }

        function removeSeason(id) {
            const block = document.getElementById(`season-block-${id}`);
            if (block) {
                block.remove();
            }
        }
    </script>
</body>
</html>
