<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamed - Add Series</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        body {
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            background-image: url("static/bg_v2d.png");
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            color: #ffffff;
            box-sizing: border-box;
        }

        .glass-panel {
            background: rgba(20, 25, 30, 0.4); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .glass-panel h1 {
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: rgba(255, 255, 255, 0.95);
        }

        .section-title {
            font-size: 18px;
            font-weight: 500;
            color: #55b9f3;
            margin-bottom: 15px;
            margin-top: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            margin-left: 4px;
        }

        input[type="text"] {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 14px 16px;
            color: #fff;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s ease;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            background: rgba(0, 0, 0, 0.5);
            border-color: #55b9f3;
            box-shadow: 0 0 0 3px rgba(85, 185, 243, 0.15);
        }

        input[type="text"]:disabled, input[type="file"]:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        input[type="file"] {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            width: 100%;
        }

        input[type="file"]::file-selector-button {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #fff;
            padding: 8px 16px;
            margin-right: 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        .season-block {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .season-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .season-header h3 {
            margin: 0;
            font-size: 16px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
        }

        button {
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        .btn-remove {
            background: rgba(255, 75, 75, 0.1);
            border: 1px solid rgba(255, 75, 75, 0.3);
            color: #ff6b6b;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .btn-add {
            background: transparent;
            border: 1px dashed rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.8);
            border-radius: 12px;
            padding: 14px;
            font-size: 14px;
            width: 100%;
            margin-top: 10px;
        }

        .btn-submit {
            margin-top: 15px;
            background: rgba(85, 185, 243, 0.1);
            border: 1px solid rgba(85, 185, 243, 0.4);
            border-radius: 12px;
            padding: 16px;
            color: #55b9f3;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
        }

        .btn-submit:hover {
            background: #55b9f3;
            color: #121212;
            box-shadow: 0 4px 20px rgba(85, 185, 243, 0.4);
        }

        /* --- Progress Bar Styles --- */
        #progress-container {
            display: none; /* Hidden initially */
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 20px;
            animation: fadeIn 0.4s ease-out;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: 500;
        }

        #progress-log {
            color: #55b9f3;
        }

        #progress-percent {
            color: rgba(255, 255, 255, 0.8);
        }

        .progress-track {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #55b9f3, #4fe1db);
            border-radius: 10px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(85, 185, 243, 0.5);
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h1>Register New Series</h1>
        <form id="uploadForm" action="/upload_series" method="post" enctype="multipart/form-data">
            
            <input type="hidden" name="max_season_index" id="max_season_index" value="1">

            <div class="section-title">Series Details</div>
            
            <div class="input-group">
                <input autocomplete="off" name="series_title" placeholder="Series Title" type="text" required>
            </div>
            
            <div class="input-group">
                <input autocomplete="off" name="series_description" placeholder="Series Description" type="text" required>
            </div>
            
            <div class="input-group">
                <label>Main Series Cover (.png)</label>
                <input type="file" name="series_cover" accept=".png" required>
            </div>

            <div class="section-title" style="margin-top: 20px;">Seasons</div>
            <div id="seasons-container">
                <div class="season-block" id="season-block-1">
                    <div class="season-header">
                        <h3>Season 1</h3>
                    </div>
                    <div class="input-group">
                        <label>Season 1 Cover (.png)</label>
                        <input type="file" name="season_1_cover" accept=".png" required>
                    </div>
                    <div class="input-group">
                        <label>Episodes (.mp4) — Select multiple files</label>
                        <input type="file" name="season_1_episodes" accept=".mp4" multiple required>
                    </div>
                </div>
            </div>

            <button type="button" class="btn-add" id="addSeasonBtn" onclick="addSeason()">
                + Add Another Season
            </button>
            
            <button class="btn-submit" id="submitBtn" type="submit">Upload Complete Series</button>

            <!-- Progress Bar Container -->
            <div id="progress-container">
                <div class="progress-header">
                    <span id="progress-log">Preparing upload...</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>

        </form>
    </div>
<script>
        let seasonIndex = 1;

        function addSeason() {
            seasonIndex++;
            document.getElementById('max_season_index').value = seasonIndex;

            const container = document.getElementById('seasons-container');
            const seasonBlock = document.createElement('div');
            seasonBlock.className = 'season-block';
            seasonBlock.id = `season-block-${seasonIndex}`;
            
            seasonBlock.innerHTML = `
                <div class="season-header">
                    <h3>Season ${seasonIndex}</h3>
                    <button type="button" class="btn-remove" onclick="removeSeason(${seasonIndex})">Remove</button>
                </div>
                <div class="input-group">
                    <label>Season ${seasonIndex} Cover (.png)</label>
                    <input type="file" name="season_${seasonIndex}_cover" accept=".png" required>
                </div>
                <div class="input-group">
                    <label>Episodes (.mp4) — Select multiple files</label>
                    <input type="file" id="season_${seasonIndex}_episodes" name="season_${seasonIndex}_episodes" accept=".mp4" multiple required>
                </div>
            `;
            container.appendChild(seasonBlock);
        }

        function removeSeason(id) {
            const block = document.getElementById(`season-block-${id}`);
            if (block) block.remove();
        }

        // --- ASYNC CHUNKED UPLOAD LOGIC ---
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const form = this;
            const submitBtn = document.getElementById('submitBtn');
            const addBtn = document.getElementById('addSeasonBtn');
            const progressContainer = document.getElementById('progress-container');
            const fill = document.getElementById('progress-fill');
            const log = document.getElementById('progress-log');
            const percentText = document.getElementById('progress-percent');
            
            const maxSeason = parseInt(document.getElementById('max_season_index').value);
            const seriesTitle = form.querySelector('input[name="series_title"]').value;

            // 1. Lock the UI
            const allInputs = form.querySelectorAll('input, button');
            allInputs.forEach(input => input.disabled = true);
            submitBtn.style.display = 'none';
            addBtn.style.display = 'none';
            progressContainer.style.display = 'block';

            try {
                // Send Initialization Data
                log.innerText = "Creating folders and saving covers...";
                
                // Grab all values BEFORE we lock the UI
                const seriesTitleVal = form.querySelector('input[name="series_title"]').value;
                const seriesDescVal = form.querySelector('input[name="series_description"]').value;
                const seriesCoverFile = form.querySelector('input[name="series_cover"]').files[0];

                let initData = new FormData();
                initData.append("action", "init");
                initData.append("series_title", seriesTitleVal);
                initData.append("series_description", seriesDescVal);
                initData.append("max_season_index", maxSeason);
                initData.append("series_cover", seriesCoverFile);

                for (let i = 1; i <= maxSeason; i++) {
                    let coverInput = form.querySelector(`input[name="season_${i}_cover"]`);
                    if (coverInput && coverInput.files[0]) {
                        initData.append(`season_${i}_cover`, coverInput.files[0]);
                    }
                }

                let initRes = await fetch('/upload_series', { method: 'POST', body: initData });

                if (!initRes.ok) {
                    let errData = await initRes.json().catch(() => ({error: "Unknown Server Error"}));
                    throw new Error(errData.error || "Failed to initialize series.");
                }

                // Upload Video Files in Chunks
                const CHUNK_SIZE = 50 * 1024 * 1024;
                
                let totalBytes = 0;
                let uploadedBytes = 0;
                let filesToUpload = [];

                for (let i = 1; i <= maxSeason; i++) {
                    let epInput = form.querySelector(`input[name="season_${i}_episodes"]`);
                    if (epInput && epInput.files.length > 0) {
                        for (let file of epInput.files) {
                            totalBytes += file.size;
                            filesToUpload.push({ seasonIndex: i, file: file });
                        }
                    }
                }

                for (let j = 0; j < filesToUpload.length; j++) {
                    let target = filesToUpload[j];
                    let file = target.file;
                    let totalChunks = Math.ceil(file.size / CHUNK_SIZE);

                    log.innerText = `Uploading S${target.seasonIndex} - ${file.name}...`;

                    for (let chunkIndex = 0; chunkIndex < totalChunks; chunkIndex++) {
                        let start = chunkIndex * CHUNK_SIZE;
                        let end = Math.min(start + CHUNK_SIZE, file.size);
                        let chunk = file.slice(start, end);

                        let chunkData = new FormData();
                        chunkData.append("action", "chunk");
                        chunkData.append("series_title", seriesTitleVal); 
                        chunkData.append("season_index", target.seasonIndex);
                        chunkData.append("filename", file.name);
                        chunkData.append("chunk", chunk);

                        let chunkRes = await fetch('/upload_series', { method: 'POST', body: chunkData });
                        
                        if (!chunkRes.ok) {
                            let errData = await chunkRes.json().catch(() => ({error: `Failed during ${file.name}`}));
                            throw new Error(errData.error);
                        }
                        await chunkRes.text(); 
                        // Let the browser clear RAM every five chunks
                        if (chunkIndex % 5 === 0) {
                            await new Promise(resolve => setTimeout(resolve, 50));
                        }

                        uploadedBytes += (end - start);
                        let percentComplete = Math.round((uploadedBytes / totalBytes) * 100);
                        fill.style.width = percentComplete + '%';
                        percentText.innerText = percentComplete + '%';
                    }
                }

                // Finalize
                log.innerText = "Finalizing server data... (Please wait)";
                fill.style.background = "#56ec84";
                fill.style.boxShadow = "0 0 10px rgba(86, 236, 132, 0.5)";

                let finalizeData = new FormData();
                finalizeData.append("action", "finalize");
                
                let finalRes = await fetch('/upload_series', { method: 'POST', body: finalizeData });
                let finalJson = await finalRes.json();

                if (finalRes.ok && finalJson.redirect) {
                    log.innerText = "Upload Complete! Redirecting...";
                    setTimeout(() => window.location.href = finalJson.redirect, 1000);
                }

            } catch (error) {
                console.error(error);
                log.innerText = error.message;
                log.style.color = "#ff6b6b";
                fill.style.background = "#ff6b6b";
                fill.style.boxShadow = "none";
                
                allInputs.forEach(input => input.disabled = false);
                submitBtn.style.display = 'block';
            }
        });
    </script>
</body>
</html>
